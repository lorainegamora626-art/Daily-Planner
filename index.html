<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sky Planner Pro</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(#87CEEB,#e8f9ff);overflow-x:hidden}
.cloud{position:fixed;background:#fff;border-radius:50px;width:140px;height:45px;animation:float 40s linear infinite;opacity:.9}
.cloud:before,.cloud:after{content:"";position:absolute;background:#fff;border-radius:50%}
.cloud:before{width:55px;height:55px;left:15px;top:-20px}
.cloud:after{width:70px;height:70px;right:15px;top:-35px}
.c1{top:40px;left:-180px}.c2{top:120px;left:-320px;animation-delay:10s}
@keyframes float{from{transform:translateX(0)}to{transform:translateX(calc(100vw + 500px))}}
.wrap{max-width:1100px;margin:60px auto;background:#fff;padding:25px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,.15)}
h1{text-align:center;color:#1976d2}
.top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
button{cursor:pointer;border:none;border-radius:10px;padding:10px 16px;background:#4fc3f7;color:#fff;font-weight:bold}
#days{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:20px 0}
.day{background:#e3f2fd;border-radius:12px;padding:12px;text-align:center}
.day.active{outline:3px solid #29b6f6}
#tasks .row{display:flex;gap:10px;margin:8px 0}
input[type=time],input[type=text]{padding:10px;border:2px solid #81d4fa;border-radius:8px}
input[type=text]{flex:1}
.small{background:#ef5350}.green{background:#43a047}
</style>
</head>
<body>
<div class="cloud c1"></div><div class="cloud c2"></div>
<div class="wrap">
<h1>☁ My Sky Planner ☀</h1>
<div class="top">
<button onclick="changeWeek(-7)">◀ Previous Week</button>
<h2 id="range"></h2>
<button onclick="changeWeek(7)">Next Week ▶</button>
</div>
<div id="days"></div>
<h3 id="title">Select a day</h3>
<div id="tasks"></div>
<p>
<button onclick="addTask()">+ Add Task</button>
<button class="green" onclick="save()">Save</button>
</p>
</div>
<script>
let weekOffset=0,currentKey="",currentDate="";
function monday(d){d=new Date(d);let day=d.getDay();let diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff);d.setHours(0,0,0,0);return d;}
function fmt(d){return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});}
function renderWeek(){
 const m=monday(new Date());m.setDate(m.getDate()+weekOffset);
 const days=document.getElementById('days');days.innerHTML='';
 let end=new Date(m);end.setDate(end.getDate()+6);
 document.getElementById('range').textContent=fmt(m)+' - '+fmt(end);
 ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].forEach((n,i)=>{
   let d=new Date(m);d.setDate(m.getDate()+i);
   let key=d.toISOString().slice(0,10);
   let c=document.createElement('div');
   c.className='day';
   c.innerHTML='<b>'+n+'</b><br>'+fmt(d);
   c.onclick=()=>openDay(n,key,c);
   days.appendChild(c);
 });
}
function openDay(name,key,card){
 document.querySelectorAll('.day').forEach(x=>x.classList.remove('active'));
 card.classList.add('active');
 currentKey=key;
 document.getElementById('title').textContent=name+' - '+key;
 let arr=JSON.parse(localStorage.getItem(key)||'[]');
 let t=document.getElementById('tasks');t.innerHTML='';
 if(!arr.length)addTask();
 else arr.forEach(a=>createRow(a.time,a.text));
}
function createRow(time='',text=''){
 let r=document.createElement('div');r.className='row';
 r.innerHTML='<input type="time" value="'+time+'"><input type="text" value="'+text+'" placeholder="Enter errand"><button class="small" onclick="this.parentElement.remove()">Delete</button>';
 document.getElementById('tasks').appendChild(r);
}
function addTask(){createRow();}
function save(){
 if(!currentKey){alert('Select a day first');return;}
 let data=[];
 document.querySelectorAll('#tasks .row').forEach(r=>{
   data.push({time:r.children[0].value,text:r.children[1].value});
 });
 localStorage.setItem(currentKey,JSON.stringify(data));
 alert('Saved for '+currentKey);
}
function changeWeek(days){weekOffset+=days;renderWeek();document.getElementById('tasks').innerHTML='';document.getElementById('title').textContent='Select a day';}
renderWeek();
</script>
</body></html>
