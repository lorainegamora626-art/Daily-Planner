<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky Planner</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(to bottom,#87CEEB,#dff6ff);
    min-height:100vh;
    overflow-x:hidden;
}

/* Clouds */
.cloud{
    position:absolute;
    background:white;
    border-radius:50px;
    opacity:.9;
}

.cloud::before,
.cloud::after{
    content:"";
    position:absolute;
    background:white;
    border-radius:50%;
}

.cloud1{
    width:140px;
    height:45px;
    top:40px;
    left:8%;
}

.cloud1::before{
    width:55px;
    height:55px;
    left:15px;
    top:-25px;
}

.cloud1::after{
    width:70px;
    height:70px;
    right:15px;
    top:-35px;
}

.cloud2{
    width:170px;
    height:50px;
    top:100px;
    right:10%;
}

.cloud2::before{
    width:60px;
    height:60px;
    left:25px;
    top:-25px;
}

.cloud2::after{
    width:75px;
    height:75px;
    right:20px;
    top:-35px;
}

.container{
    position:relative;
    width:90%;
    max-width:900px;
    margin:60px auto;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#1e88e5;
    margin-bottom:25px;
}

.days{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}

.days button{
    padding:15px;
    border:none;
    border-radius:12px;
    background:#4fc3f7;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

.days button:hover{
    background:#29b6f6;
    transform:translateY(-3px);
}

.editor{
    display:none;
    margin-top:30px;
}

.editor h2{
    color:#1976d2;
    margin-bottom:15px;
}

.task{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.task input[type="time"]{
    width:140px;
    padding:10px;
    border:2px solid #81d4fa;
    border-radius:8px;
}

.task input[type="text"]{
    flex:1;
    padding:10px;
    border:2px solid #81d4fa;
    border-radius:8px;
}

#tasks{
    margin-bottom:15px;
}

.add,
.save{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-size:16px;
}

.add{
    background:#29b6f6;
}

.save{
    background:#43a047;
}
</style>
</head>

<body>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<div class="container">

<h1>☁ My Sky Daily Planner ☁</h1>

<div class="days">
<button onclick="openDay('Monday')">Monday</button>
<button onclick="openDay('Tuesday')">Tuesday</button>
<button onclick="openDay('Wednesday')">Wednesday</button>
<button onclick="openDay('Thursday')">Thursday</button>
<button onclick="openDay('Friday')">Friday</button>
<button onclick="openDay('Saturday')">Saturday</button>
<button onclick="openDay('Sunday')">Sunday</button>
</div>

<div class="editor" id="editor">

<h2 id="title"></h2>

<div id="tasks"></div>

<button class="add" onclick="addTask()">+ Add Task</button>
<button class="save" onclick="saveTasks()">Save</button>

</div>

</div>

<script>

let currentDay="";

function openDay(day){
    currentDay=day;
    document.getElementById("editor").style.display="block";
    document.getElementById("title").innerHTML="Schedule for "+day;

    let saved=JSON.parse(localStorage.getItem(day)||"[]");

    let container=document.getElementById("tasks");
    container.innerHTML="";

    if(saved.length==0){
        addTask();
    }else{
        saved.forEach(task=>{
            createTask(task.time,task.text);
        });
    }
}

function createTask(time="",text=""){
    let div=document.createElement("div");
    div.className="task";

    div.innerHTML=`
        <input type="time" value="${time}">
        <input type="text" placeholder="Enter your errand..." value="${text}">
    `;

    document.getElementById("tasks").appendChild(div);
}

function addTask(){
    createTask();
}

function saveTasks(){

    let data=[];

    document.querySelectorAll(".task").forEach(task=>{

        let time=task.children[0].value;
        let text=task.children[1].value;

        data.push({
            time:time,
            text:text
        });

    });

    localStorage.setItem(currentDay,JSON.stringify(data));

    alert("Saved!");
}

</script>

</body>
</html>
